[build]
  command = "node scripts/build-netlify.mjs"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/speech"
  to = "/.netlify/functions/speech"
  status = 200

[[redirects]]
  from = "/api/transcribe"
  to = "/.netlify/functions/transcribe"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "microphone=(self)"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
